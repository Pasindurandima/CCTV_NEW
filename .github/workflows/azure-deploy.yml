# Docs for the Azure Web Apps Deploy action:
# https://github.com/Azure/webapps-deploy

# More GitHub Actions for Azure:
# https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - pasindu-checkin-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      - name: Checkout source code
        uses: actions/checkout@v4


      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'


      # Build Spring Boot backend
      - name: Build with Maven
        working-directory: backend
        run: ./mvnw clean install -DskipTests


      # Upload generated JAR
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: backend/target/*.jar



  deploy:

    runs-on: ubuntu-latest

    needs: build

    permissions:
      id-token: write
      contents: read


    steps:

      # Download JAR from build job
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: .


      # Login to Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_59E6742727AC4C7A9FC28AF8205FFBE2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C1DC2E6CB0E040D595608B2A72A2CD0E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B43506646BB340F0A72F4CB0A9C97F5D }}


      # Deploy JAR to Azure Web App
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pasindu-checkin-api'
          slot-name: 'Production'
          package: '*.jar'