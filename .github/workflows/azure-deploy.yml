# Docs for Azure Web Apps Deploy:
# https://github.com/Azure/webapps-deploy

name: Build and deploy Spring Boot JAR to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      - name: Checkout source code
        uses: actions/checkout@v4


      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'


      - name: Build Spring Boot Application
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests


      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: backend/target/*.jar



  deploy:

    runs-on: ubuntu-latest

    needs: build

    permissions:
      id-token: write
      contents: read


    steps:

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: .


      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_59E6742727AC4C7A9FC28AF8205FFBE2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C1DC2E6CB0E040D595608B2A72A2CD0E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B43506646BB340F0A72F4CB0A9C97F5D }}


      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pasindu-checkin-api'
          slot-name: 'Production'
          package: '*.jar'

          app-settings-json: |
            [
              {
                "name": "DB_PASSWORD",
                "value": "${{ secrets.DB_PASSWORD }}",
                "slotSetting": false
              }
            ]